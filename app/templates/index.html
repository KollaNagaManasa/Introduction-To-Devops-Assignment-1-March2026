<!doctype html>
<html lang="en" style="scroll-behavior:smooth;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ACEest Fitness Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --gold:#d4af37;
  --dark:#121212;
}

body {
  background:var(--dark);
  color:#eee;
  font-family:'Segoe UI',sans-serif;
}

/* NAVBAR */
.navbar {
  background:linear-gradient(90deg,#d4af37,#f5d76e)!important;
}
.navbar-brand {
  font-weight:900;
}

/* HERO */
.hero {
  background: radial-gradient(circle at center, #1f1f1f, #000);
  text-align:center;
  padding:60px 20px;
}
.hero h1 {
  color:var(--gold);
  font-weight:900;
}

/* CARD */
.card {
  background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

/* INPUT */
.form-control {
  background:#1f1f1f;
  border:1px solid #555;
  color:#fff;
  padding:12px;
  border-radius:8px;
}
.form-control::placeholder {
  color:#aaa;
}
.form-control:focus {
  border-color:var(--gold);
  box-shadow:0 0 10px rgba(212,175,55,0.6);
  background:#2a2a2a;
}

/* BUTTON */
.btn-gold {
  background:linear-gradient(90deg,#d4af37,#f5d76e);
  border:none;
  font-weight:bold;
  border-radius:8px;
}
.btn-gold:hover {
  transform:scale(1.05);
}

/* SECTION */
.section-title {
  color:var(--gold);
  font-weight:800;
  margin-bottom:20px;
}

/* LIST */
.list-group-item {
  background:#222;
  border:none;
  margin-bottom:6px;
  border-radius:6px;
}

/* CENTER FIX */
.row-center {
  display:flex;
  justify-content:center;
}

/* PROGRAM */
.program {
  border-left:4px solid var(--gold);
}

/* GLOBAL */
* { transition:0.2s; }

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="container-fluid">
<a class="navbar-brand">⚡ ACEest FITNESS</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>ACEest FUNCTIONAL FITNESS</h1>
<p class="text-secondary">Clean Dashboard UI</p>
</div>

<div class="container py-5">

<!-- PROGRAMS -->
<h4 class="section-title">🏋️ Programs</h4>
<div class="row g-4" id="programs"></div>

<!-- CALCULATOR -->
<h4 class="section-title mt-5">🔥 Calorie Calculator</h4>
<div class="card" style="max-width:420px;">
<input id="weight" class="form-control mb-3" placeholder="Weight (kg)">
<select id="program" class="form-control mb-3">
<option value="">Select Program</option>
<option value="FL">Fat Loss</option>
<option value="MG">Muscle Gain</option>
<option value="BG">Beginner</option>
</select>
<button class="btn btn-gold w-100" onclick="calc()">Calculate</button>
<div id="result" class="mt-3 text-center"></div>
</div>

<!-- WORKOUT + MEMBERS (FIXED) -->
<h4 class="section-title mt-5">📋 Manage Data</h4>

<div class="row g-5 row-center">

  <!-- WORKOUT -->
  <div class="col-md-5">
    <div class="card">
      <h5 class="mb-3">Add Workout</h5>
      <input id="wname" class="form-control mb-3" placeholder="Workout name">
      <input id="wdur" class="form-control mb-3" placeholder="Duration (mins)">
      <button class="btn btn-gold w-100" onclick="addWorkout()">Add Workout</button>
    </div>

    <ul id="workouts" class="list-group mt-3"></ul>
  </div>

  <!-- MEMBERS -->
  <div class="col-md-5">
    <div class="card">
      <h5 class="mb-3">Register Member</h5>
      <input id="mname" class="form-control mb-3" placeholder="Name">
      <input id="memail" class="form-control mb-3" placeholder="Email">
      <button class="btn btn-gold w-100" onclick="addMember()">Register Member</button>
    </div>

    <ul id="members" class="list-group mt-3"></ul>
  </div>

</div>

</div>

<script>

// PROGRAMS
async function loadPrograms(){
let res=await fetch('/programs');
let data=await res.json();
let div=document.getElementById('programs');
div.innerHTML='';

Object.entries(data).forEach(([k,v])=>{
div.innerHTML+=`
<div class="col-md-4">
<div class="card program p-3">
<h5>${k}</h5>
<p>${v.diet}</p>
</div>
</div>`;
});
}

// CALCULATOR
async function calc(){
let w=document.getElementById('weight').value;
let p=document.getElementById('program').value;

let res=await fetch('/calories',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({weight_kg:w,program_code:p})
});

let d=await res.json();
document.getElementById('result').innerHTML=`<h3>${d.estimated_daily_kcal} kcal/day</h3>`;
}

// WORKOUTS
async function loadWorkouts(){
let res=await fetch('/workouts');
let data=await res.json();
let ul=document.getElementById('workouts');
ul.innerHTML='';

data.forEach(w=>{
ul.innerHTML+=`<li class="list-group-item">${w.name} - ${w.duration_minutes} min</li>`;
});
}

async function addWorkout(){
await fetch('/workouts',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById('wname').value,
duration_minutes:document.getElementById('wdur').value
})
});
loadWorkouts();
}

// MEMBERS
async function loadMembers(){
let res=await fetch('/members');
let data=await res.json();
let ul=document.getElementById('members');
ul.innerHTML='';

data.forEach(m=>{
ul.innerHTML+=`<li class="list-group-item">${m.name} (${m.email})</li>`;
});
}

async function addMember(){
await fetch('/members',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById('mname').value,
email:document.getElementById('memail').value
})
});
loadMembers();
}

// INIT
loadPrograms();
loadWorkouts();
loadMembers();

</script>

</body>
</html>
